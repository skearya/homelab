services:
  stalwart:
    image: stalwartlabs/stalwart:v0.16
    container_name: stalwart
    restart: unless-stopped
    environment:
      - STALWART_PUBLIC_URL=https://mail.${DOMAIN?}
    ports:
      - 25:25
      - 587:587
      - 465:465
      - 143:143
      - 993:993
      - 110:110
      - 995:995
      - 4190:4190
    volumes:
      - ../data/stalwart-etc:/etc/stalwart
      - ../data/stalwart-data:/var/lib/stalwart
