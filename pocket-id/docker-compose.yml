services:
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    container_name: pocket-id
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - APP_URL=https://id.${DOMAIN?}
      - TRUST_PROXY=true
      - UI_CONFIG_DISABLED=true
      - APP_NAME=${POCKET_ID_NAME?}
      - SESSION_DURATION=40320
      - ALLOW_USER_SIGNUPS=withToken
    env_file:
      - .env
    volumes:
      - ../data/pocket-id:/app/data
    healthcheck:
      test: ["CMD", "/app/pocket-id", "healthcheck"]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
