services:
  caddy:
    image: caddy:2.11
    container_name: caddy
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN?}
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    volumes:
      - ./config:/etc/caddy
      - ../data/caddy-data:/data
      - ../data/caddy-config:/config
